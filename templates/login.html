<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
     <style>
      .footer {
        margin-top: 40px;
        padding: 20px 0;
        text-align: center;
        color: #aaa;
        font-size: 14px;
        border-top: 1px solid #333;
      }
    </style>
  </head>

  <body class="bg-dark d-flex justify-content-center align-items-center vh-100">
    <div
      class="card shadow-lg p-4 rounded-4 bg-black text-white"
      style="width: 420px"
    >
      <h2 class="text-center mb-4">Login</h2>

      <form method="POST">
        <div class="mb-3">
          <input
            type="email"
            name="email"
            class="form-control"
            placeholder="Enter email"
            required
          />
        </div>

        <div class="mb-3">
          <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Enter password"
            required
          />
        </div>

        <button class="btn btn-primary w-100 py-2">Login</button>
      </form>

      <p class="text-center mt-3 mb-0">
        No account?
        <a href="/signup" class="text-info text-decoration-none"> Signup </a>
      </p>
    </div>
        <footer class="footer">© 2026 Durga. Built by me.</footer>

  </body>
</html>
