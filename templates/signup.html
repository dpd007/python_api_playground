<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signup</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-dark d-flex justify-content-center align-items-center vh-100">
    <div
      class="card shadow-lg p-4 rounded-4 bg-black text-white"
      style="width: 420px"
    >
      <h2 class="text-center mb-4">Signup</h2>

      <form method="POST">
        <div class="mb-3">
          <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Username"
            required
          />
        </div>

        <div class="mb-3">
          <input
            type="email"
            name="email"
            class="form-control"
            placeholder="Email"
            required
          />
        </div>

        <div class="mb-3">
          <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Password"
            required
          />
        </div>

        <button class="btn btn-success w-100 py-2">Signup</button>
      </form>

      <p class="text-center mt-3 mb-0">
        Already have account?
        <a href="/login" class="text-info text-decoration-none"> Login </a>
      </p>
    </div>
  </body>
</html>
